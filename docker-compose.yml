# docker-compose.yml
# ══════════════════════════════════════════════════════════════════
# ONE command starts and runs everything:
#
#   docker compose up --build
#
# Startup order:
#   1. pipeline        — runs main.py (trains models, generates CSV)
#   2. telemetry-api   — starts FastAPI inference server
#   3. telemetry-dashboard — starts Streamlit (waits for pipeline + api)
#   4. kafka-consumer  — starts streaming CSV → Kafka → API
#   5. zookeeper + kafka — message broker
#   6. prometheus      — scrapes API metrics every 5s
#   7. grafana         — auto-provisions dashboard (admin/admin)
#
# URLs once running:
#   Streamlit    http://localhost:8501
#   FastAPI docs http://localhost:8000/docs
#   Grafana      http://localhost:3000   (admin / admin)
#   Prometheus   http://localhost:9090
# ══════════════════════════════════════════════════════════════════

services:

  # ── STEP 1: Run ML pipeline (main.py) ───────────────────────────
  # Trains Isolation Forest, Autoencoder, Random Forest, LSTM,
  # computes risk scores, saves models/ and outputs/telemetry_results.csv
  # All other services wait for this to complete successfully.
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: telemetry-pipeline
    volumes:
      - ./outputs:/app/outputs        # write results here
      - ./models:/app/models          # write trained models here
    restart: "no"                     # run once and exit

  # ── STEP 2: FastAPI Inference API ───────────────────────────────
  telemetry-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: telemetry-api
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
    depends_on:
      pipeline:
        condition: service_completed_successfully
    restart: always

  # ── STEP 3: Streamlit Dashboard ─────────────────────────────────
  telemetry-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telemetry-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - API_URL=http://telemetry-api:8000
      - GRAFANA_URL=http://localhost:3000
    depends_on:
      pipeline:
        condition: service_completed_successfully
      telemetry-api:
        condition: service_started
    restart: always

  # ── STEP 4: Kafka Consumer (streams CSV → Kafka → API) ──────────
  kafka-consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: telemetry-kafka-consumer
    volumes:
      - ./outputs:/app/outputs        # reads telemetry_results.csv
    environment:
      - KAFKA_BOOTSTRAP=kafka:29092
      - API_URL=http://telemetry-api:8000/predict
      - TOPIC_NAME=telemetry-input
      - CSV_PATH=/app/outputs/telemetry_results.csv
      - DELAY_SECONDS=0.3
    depends_on:
      pipeline:
        condition: service_completed_successfully
      kafka:
        condition: service_started
      telemetry-api:
        condition: service_started
    restart: on-failure

  # ── Zookeeper ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: telemetry-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: always

  # ── Kafka ────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: telemetry-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: telemetry-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      telemetry-api:
        condition: service_started
    restart: always

  # ── Grafana (auto-provisions datasource + dashboard) ─────────────
  grafana:
    image: grafana/grafana:latest
    container_name: telemetry-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: always